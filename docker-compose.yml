version: '3.8'

services:
  openclaw-monitor:
    build: .
    container_name: openclaw-monitor
    ports:
      - "5050:5050"
    volumes:
      # Mount OpenClaw directory to read session data
      - /home/n100/.openclaw:/root/.openclaw:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s